<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ chối Đề nghị mua hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #EA4335;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .request-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #EA4335;
        }

        .request-info p {
            margin: 8px 0;
            color: #333;
        }

        .request-info strong {
            color: #555;
            display: inline-block;
            min-width: 140px;
        }

        .reason-section {
            margin: 20px 0;
            padding: 20px;
            background: #fff5f5;
            border-radius: 8px;
            border-left: 4px solid #EA4335;
        }

        .reason-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .reason-section h3 .required {
            color: #EA4335;
        }

        .reason-section label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .reason-section textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .reason-section textarea:focus-visible {
            outline: 2px solid #EA4335;
            outline-offset: 2px;
            border-color: #EA4335;
            box-shadow: 0 0 0 2px rgba(234, 67, 53, 0.2);
        }

        .error-text {
            color: #EA4335;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reject {
            background: #EA4335;
            color: white;
        }

        .btn-reject:hover:not(:disabled) {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(234, 67, 53, 0.3);
        }

        .btn-reject:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #EA4335;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌ Từ chối Đề nghị mua hàng</h1>
        <p class="subtitle">Xác nhận từ chối đề nghị này</p>

        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Đang xử lý...</p>
        </div>

        <div id="request-info" class="request-info">
            <p><strong>Số đề nghị:</strong> <span id="request-id">Loading...</span></p>
            <p><strong>Loại đề nghị:</strong> <span id="request-type">Loading...</span></p>
            <p><strong>Công ty:</strong> <span id="company">Loading...</span></p>
            <p><strong>Người đề nghị:</strong> <span id="requestor">Loading...</span></p>
            <p><strong>Tổng số tiền:</strong> <span id="amount">Loading...</span></p>
            <p><strong>Giai đoạn phê duyệt:</strong> <span id="stage">Loading...</span></p>
        </div>

        <!-- Reason Section -->
        <div class="reason-section">
            <h3>📝 Lý do từ chối <span class="required">*</span></h3>
            <label for="reason-input">Vui lòng nhập lý do từ chối đề nghị này:</label>
            <textarea id="reason-input" placeholder="Ví dụ: Ngân sách không đủ, Thông tin không đầy đủ, Không phù hợp với kế hoạch..." required></textarea>
            <p id="reason-error" class="error-text"></p>
        </div>

        <div class="button-group">
            <button type="button" class="btn-cancel" onclick="window.close()">Hủy</button>
            <button type="button" class="btn-reject" onclick="rejectRequest()" id="reject-btn">Xác nhận từ chối</button>
        </div>
    </div>

    <script>
        // Configuration
        const VERCEL_PROXY_URL = 'https://workflow.egg-ventures.com/api/voucher';
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('requestId');
        const stage = urlParams.get('stage') || 'final'; // budget, supplier, legal, accounting, director, final
        
        // State
        let requestDetails = null;
        let hasRejected = false;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (!requestId) {
                showMessage('error', '❌ Thiếu thông tin đề nghị. Vui lòng kiểm tra lại link.');
                return;
            }
            
            loadRequestDetails();
        });
        
        // Load request details
        async function loadRequestDetails() {
            try {
                const response = await fetch(VERCEL_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'getPaymentRequestDetails',
                        requestId: requestId
                    })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.message || 'Failed to load request details');
                }
                
                requestDetails = result.details;
                displayRequestInfo();
                
            } catch (error) {
                console.error('Error loading request details:', error);
                showMessage('error', '❌ Không thể tải thông tin đề nghị: ' + error.message);
            }
        }
        
        // Display request information
        function displayRequestInfo() {
            if (!requestDetails) return;
            
            document.getElementById('request-id').textContent = requestDetails.requestId || 'N/A';
            document.getElementById('request-type').textContent = requestDetails.purchaseType || 'N/A';
            document.getElementById('company').textContent = requestDetails.company || 'N/A';
            document.getElementById('requestor').textContent = requestDetails.requestor || 'N/A';
            document.getElementById('amount').textContent = requestDetails.totalAmount || 'N/A';
            
            // Display stage name
            const stageNames = {
                'budget': 'Phê duyệt ngân sách',
                'supplier': 'Phê duyệt nhà cung cấp',
                'legal': 'Phê duyệt pháp chế',
                'accounting': 'Phê duyệt kế toán',
                'director': 'Phê duyệt giám đốc',
                'final': 'Phê duyệt cuối cùng'
            };
            document.getElementById('stage').textContent = stageNames[stage] || stage;
            
            // Check if already rejected
            const statusField = stage + 'Status';
            if (requestDetails[statusField] === 'Rejected') {
                showMessage('error', '⚠️ Đề nghị này đã bị từ chối. Không thể từ chối lại.');
                document.getElementById('reject-btn').disabled = true;
                hasRejected = true;
            } else if (requestDetails[statusField] === 'Approved') {
                showMessage('error', '⚠️ Đề nghị này đã được phê duyệt. Không thể từ chối.');
                document.getElementById('reject-btn').disabled = true;
                hasRejected = true;
            }
        }
        
        // Reject request
        async function rejectRequest() {
            if (hasRejected) {
                showMessage('error', '⚠️ Đề nghị này đã được xử lý. Không thể từ chối lại.');
                return;
            }
            
            const reason = document.getElementById('reason-input').value.trim();
            
            if (!reason) {
                showReasonError('❌ Vui lòng nhập lý do từ chối');
                return;
            }
            
            if (reason.length < 10) {
                showReasonError('❌ Lý do từ chối phải có ít nhất 10 ký tự');
                return;
            }
            
            if (!confirm('Bạn có chắc chắn muốn từ chối đề nghị này?\n\nLý do: ' + reason)) {
                return;
            }
            
            const loading = document.getElementById('loading');
            const rejectBtn = document.getElementById('reject-btn');
            
            loading.classList.add('show');
            rejectBtn.disabled = true;
            
            try {
                const payload = {
                    action: 'rejectPaymentRequest',
                    requestId: requestId,
                    stage: stage,
                    approver: 'Approver', // This should come from logged-in user
                    rejectReason: reason
                };
                
                console.log('🚀 Sending rejection request...');
                
                const response = await fetch(VERCEL_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const responseText = await response.text();
                
                // Check for HTML error pages
                if (responseText.trim().startsWith('<!') || responseText.includes('<!DOCTYPE')) {
                    throw new Error('Backend returned HTML error page instead of JSON');
                }
                
                // Parse JSON
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    console.error('Response text:', responseText.substring(0, 500));
                    throw new Error('Invalid JSON response from backend');
                }
                
                if (!result.success) {
                    throw new Error(result.message || 'Unknown error');
                }
                
                console.log('✅ Rejection successful');
                
                showMessage('success', '✅ Từ chối thành công! Trang sẽ tự động đóng sau 3 giây...');
                hasRejected = true;
                
                // Close window after 3 seconds
                setTimeout(() => {
                    window.close();
                }, 3000);
                
            } catch (error) {
                console.error('❌ Error rejecting request:', error);
                showMessage('error', '❌ Lỗi khi từ chối: ' + error.message);
                rejectBtn.disabled = false;
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Show message
        function showMessage(type, text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type + ' show';
        }
        
        // Show reason error
        function showReasonError(text) {
            const error = document.getElementById('reason-error');
            error.textContent = text;
            error.style.display = 'block';
        }
        
        // Hide reason error
        function hideReasonError() {
            const error = document.getElementById('reason-error');
            error.textContent = '';
            error.style.display = 'none';
        }
        
        // Clear error when typing
        document.getElementById('reason-input').addEventListener('input', hideReasonError);
    </script>
</body>
</html>
