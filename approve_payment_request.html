<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phê duyệt Đề nghị mua hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #34A853;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .request-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #34A853;
        }

        .request-info p {
            margin: 8px 0;
            color: #333;
        }

        .request-info strong {
            color: #555;
            display: inline-block;
            min-width: 140px;
        }

        .signature-section {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #34A853;
        }

        .signature-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .signature-section h3 .required {
            color: #EA4335;
        }

        .signature-preview {
            margin-bottom: 15px;
            min-height: 120px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 10px;
        }

        .signature-placeholder {
            color: #94a3b8;
            font-size: 14px;
        }

        .signature-img {
            max-width: 100%;
            max-height: 150px;
            display: none;
            border-radius: 4px;
        }

        .signature-controls {
            display: flex;
            gap: 10px;
        }

        .upload-label {
            flex: 1;
            padding: 10px 16px;
            background: #34A853;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            display: inline-block;
            transition: background 0.3s;
        }

        .upload-label:hover {
            background: #2d8f47;
        }

        .clear-btn {
            padding: 10px 16px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: none;
            transition: background 0.3s;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .error-text {
            color: #EA4335;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .comment-section {
            margin: 20px 0;
        }

        .comment-section label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .comment-section textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        .comment-section textarea:focus-visible {
            outline: 2px solid #34A853;
            outline-offset: 2px;
            border-color: #34A853;
            box-shadow: 0 0 0 2px rgba(52, 168, 83, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: #34A853;
            color: white;
        }

        .btn-approve:hover:not(:disabled) {
            background: #2d8f47;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 168, 83, 0.3);
        }

        .btn-approve:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #34A853;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ PHÊ DUYỆT ĐỀ NGHỊ MUA HÀNG</h1>
        <p class="subtitle">Xác nhận phê duyệt đề nghị này</p>

        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Đang xử lý...</p>
        </div>

        <div id="request-info" class="request-info">
            <p><strong>Số đề nghị:</strong> <span id="request-id">Loading...</span></p>
            <p><strong>Loại đề nghị:</strong> <span id="request-type">Loading...</span></p>
            <p><strong>Công ty:</strong> <span id="company">Loading...</span></p>
            <p><strong>Người đề nghị:</strong> <span id="requestor">Loading...</span></p>
            <p><strong>Tổng số tiền:</strong> <span id="amount">Loading...</span></p>
            <p><strong>Giai đoạn phê duyệt:</strong> <span id="stage">Loading...</span></p>
        </div>

        <!-- Signature Upload Section -->
        <div class="signature-section">
            <h3>✍️ Chữ ký người phê duyệt <span class="required">*</span></h3>
            <div class="signature-preview">
                <span id="signature-placeholder" class="signature-placeholder">Chưa có chữ ký</span>
                <img id="signature-img" class="signature-img" src="" alt="Chữ ký">
            </div>
            <div class="signature-controls">
                <label for="signature-upload-input" class="upload-label">
                    📤 Tải lên chữ ký
                </label>
                <input type="file" id="signature-upload-input" accept="image/png,image/jpeg,image/jpg" style="display: none;">
                <button type="button" id="clear-signature-btn" class="clear-btn" onclick="clearSignature()">
                    🗑️ Xóa
                </button>
            </div>
            <p id="signature-error" class="error-text"></p>
        </div>

        <!-- Comment Section -->
        <div class="comment-section">
            <label for="comment-input">💬 Nhận xét (tùy chọn):</label>
            <textarea id="comment-input" placeholder="Nhập nhận xét của bạn về đề nghị này..."></textarea>
        </div>

        <div class="button-group">
            <button type="button" class="btn-cancel" onclick="window.close()">Hủy</button>
            <button type="button" class="btn-approve" onclick="approveRequest()" id="approve-btn" disabled>Xác nhận phê duyệt</button>
        </div>
    </div>

    <script>
        // Configuration
        const VERCEL_PROXY_URL = '/api/voucher';
        const MAX_SIGNATURE_SIZE = 300 * 1024; // 300KB
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('requestId');
        const stage = urlParams.get('stage') || 'final'; // budget, supplier, legal, accounting, director, final
        const approverEmail = urlParams.get('approverEmail') || '';

        // State
        let signatureData = null;
        let requestDetails = null;
        let hasApproved = false;
        let companyApproversData = null;
        let currentApproverRole = null;
        
        // ============ SIGNATURE CACHE ============
        const SIG_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

        function getSigCacheKey() { return `tlc_sig_${approverEmail}`; }

        function loadCachedSignature() {
            if (!approverEmail) return;
            try {
                const key = getSigCacheKey();
                const cached = localStorage.getItem(key);
                const ts = parseInt(localStorage.getItem(key + '_ts') || '0');
                if (cached && (Date.now() - ts) < SIG_CACHE_TTL) {
                    signatureData = cached;
                    const img = document.getElementById('signature-img');
                    const placeholder = document.getElementById('signature-placeholder');
                    img.src = cached;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                    document.getElementById('clear-signature-btn').style.display = 'block';
                    document.getElementById('approve-btn').disabled = false;
                    const err = document.getElementById('signature-error');
                    err.style.color = '#888';
                    err.textContent = '✔ Đang dùng chữ ký đã lưu. Bạn có thể xóa và tải lại nếu cần.';
                    err.style.display = 'block';
                    console.log('✅ Restored cached signature from localStorage');
                }
            } catch (e) { console.warn('Could not load cached signature:', e); }
        }

        function saveCachedSignature(base64) {
            if (!approverEmail || !base64) return;
            try {
                const key = getSigCacheKey();
                localStorage.setItem(key, base64);
                localStorage.setItem(key + '_ts', Date.now().toString());
            } catch (e) { console.warn('Could not cache signature:', e); }
        }
        // ============ END SIGNATURE CACHE ============

        // ============ SIGNATURE VERIFICATION ============
        async function fetchCompanyApprovers(company) {
            try {
                const response = await fetch(VERCEL_PROXY_URL + '?action=getCompanyApprovers&company=' + encodeURIComponent(company));
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                if (result.success && result.data) {
                    companyApproversData = result.data.approvers;
                    if (companyApproversData && approverEmail) {
                        if (companyApproversData.accountant && companyApproversData.accountant.email === approverEmail)
                            currentApproverRole = 'accountant';
                        else if (companyApproversData.legalRep && companyApproversData.legalRep.email === approverEmail)
                            currentApproverRole = 'legalRep';
                        else if (companyApproversData.treasurer && companyApproversData.treasurer.email === approverEmail)
                            currentApproverRole = 'treasurer';
                    }
                    console.log('✅ Company approvers loaded, role:', currentApproverRole);
                }
            } catch (e) { console.warn('Could not fetch company approvers:', e); }
        }

        async function fetchSampleSignature(signatureUrl) {
            if (!signatureUrl) return null;
            try {
                const formData = new FormData();
                formData.append('data', JSON.stringify({ action: 'fetchSignatureImage', imageUrl: signatureUrl }));
                const response = await fetch(VERCEL_PROXY_URL, { method: 'POST', body: formData });
                if (!response.ok) return null;
                const result = await response.json();
                return (result.success && result.data && result.data.imageBase64) ? result.data.imageBase64 : null;
            } catch (e) { return null; }
        }

        async function generateImageHash(base64Data) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 8; canvas.height = 8;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 8, 8);
                    const pixels = ctx.getImageData(0, 0, 8, 8).data;
                    let total = 0;
                    const grays = [];
                    for (let i = 0; i < pixels.length; i += 4) {
                        const g = pixels[i] * 0.299 + pixels[i+1] * 0.587 + pixels[i+2] * 0.114;
                        grays.push(g); total += g;
                    }
                    const avg = total / grays.length;
                    resolve(grays.map(g => g >= avg ? '1' : '0').join(''));
                };
                img.onerror = () => resolve(null);
                img.src = base64Data;
            });
        }

        async function compareSignatures(uploadedBase64, sampleUrl) {
            try {
                const sampleBase64 = await fetchSampleSignature(sampleUrl);
                if (!sampleBase64) return { verified: false, reason: 'fetch_failed', similarity: 0, threshold: 75 };
                const uploadedHash = await generateImageHash(uploadedBase64);
                const sampleHash = await generateImageHash(sampleBase64);
                if (!uploadedHash || !sampleHash) return { verified: false, reason: 'hash_failed', similarity: 0, threshold: 75 };
                let diff = 0;
                for (let i = 0; i < uploadedHash.length; i++) if (uploadedHash[i] !== sampleHash[i]) diff++;
                const similarity = ((uploadedHash.length - diff) / uploadedHash.length) * 100;
                const THRESHOLD = 75;
                console.log(`🔍 Signature similarity: ${similarity.toFixed(2)}%`);
                return similarity >= THRESHOLD
                    ? { verified: true, similarity: similarity.toFixed(2), reason: 'match', threshold: THRESHOLD }
                    : { verified: false, similarity: similarity.toFixed(2), reason: 'mismatch', threshold: THRESHOLD };
            } catch (e) {
                return { verified: false, reason: 'comparison_error', similarity: 0, threshold: 75 };
            }
        }
        // ============ END SIGNATURE VERIFICATION ============

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (!requestId) {
                showMessage('error', '❌ Thiếu thông tin đề nghị. Vui lòng kiểm tra lại link.');
                return;
            }

            loadRequestDetails();
            setupSignatureUpload();
        });
        
        // Load request details
        async function loadRequestDetails() {
            try {
                const response = await fetch(VERCEL_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'getPaymentRequestDetails',
                        requestId: requestId
                    })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.message || 'Failed to load request details');
                }
                
                requestDetails = result.details;
                displayRequestInfo();
                if (requestDetails.company) {
                    await fetchCompanyApprovers(requestDetails.company);
                }
                loadCachedSignature();
                
            } catch (error) {
                console.error('Error loading request details:', error);
                showMessage('error', '❌ Không thể tải thông tin đề nghị: ' + error.message);
            }
        }
        
        // Display request information
        function displayRequestInfo() {
            if (!requestDetails) return;
            
            document.getElementById('request-id').textContent = requestDetails.requestId || 'N/A';
            document.getElementById('request-type').textContent = requestDetails.purchaseType || 'N/A';
            document.getElementById('company').textContent = requestDetails.company || 'N/A';
            document.getElementById('requestor').textContent = requestDetails.requestor || 'N/A';
            document.getElementById('amount').textContent = requestDetails.totalAmount || 'N/A';
            
            // Display stage name
            const stageNames = {
                'budget': 'Phê duyệt ngân sách',
                'supplier': 'Phê duyệt nhà cung cấp',
                'legal': 'Phê duyệt pháp chế',
                'accounting': 'Phê duyệt kế toán',
                'director': 'Phê duyệt giám đốc',
                'final': 'Phê duyệt cuối cùng'
            };
            document.getElementById('stage').textContent = stageNames[stage] || stage;
            
            // Check if already approved
            const statusField = stage + 'Status';
            if (requestDetails[statusField] === 'Approved') {
                showMessage('error', '⚠️ Đề nghị này đã được phê duyệt. Không thể phê duyệt lại.');
                document.getElementById('approve-btn').disabled = true;
                hasApproved = true;
            } else if (requestDetails[statusField] === 'Rejected') {
                showMessage('error', '⚠️ Đề nghị này đã bị từ chối. Không thể phê duyệt.');
                document.getElementById('approve-btn').disabled = true;
                hasApproved = true;
            }
        }
        
        // Setup signature upload
        function setupSignatureUpload() {
            const input = document.getElementById('signature-upload-input');
            input.addEventListener('change', handleSignatureUpload);
        }
        
        // Handle signature upload
        async function handleSignatureUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Validate file type
            if (!file.type.startsWith('image/')) {
                showSignatureError('❌ Vui lòng chọn file ảnh (JPG, PNG)');
                event.target.value = '';
                return;
            }
            
            // Validate file size
            if (file.size > 2 * 1024 * 1024) { // 2MB
                showSignatureError('❌ File quá lớn. Tối đa 2MB');
                event.target.value = '';
                return;
            }
            
            try {
                // Compress image
                const compressed = await compressImage(file, MAX_SIGNATURE_SIZE / 1024);
                signatureData = compressed;
                
                // Show preview
                const img = document.getElementById('signature-img');
                const placeholder = document.getElementById('signature-placeholder');
                img.src = compressed;
                img.style.display = 'block';
                placeholder.style.display = 'none';
                
                // Show clear button
                document.getElementById('clear-signature-btn').style.display = 'block';
                
                // Enable approve button
                document.getElementById('approve-btn').disabled = false;
                
                const errDiv = document.getElementById('signature-error');
                errDiv.style.color = '';
                hideSignatureError();

                console.log('✅ Signature uploaded and compressed');
                
            } catch (error) {
                console.error('Error processing signature:', error);
                showSignatureError('❌ Lỗi xử lý chữ ký: ' + error.message);
                event.target.value = '';
            }
        }
        
        // Compress image
        function compressImage(file, maxSizeKB) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // Calculate new dimensions
                        const maxDimension = 800;
                        if (width > height && width > maxDimension) {
                            height = (height / width) * maxDimension;
                            width = maxDimension;
                        } else if (height > maxDimension) {
                            width = (width / height) * maxDimension;
                            height = maxDimension;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Try different quality levels
                        let quality = 0.8;
                        let compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        
                        while (compressedDataUrl.length > maxSizeKB * 1024 && quality > 0.1) {
                            quality -= 0.1;
                            compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        }
                        
                        resolve(compressedDataUrl);
                    };
                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }
        
        // Clear signature
        function clearSignature() {
            signatureData = null;
            const img = document.getElementById('signature-img');
            const placeholder = document.getElementById('signature-placeholder');
            img.src = '';
            img.style.display = 'none';
            placeholder.style.display = 'block';
            document.getElementById('signature-upload-input').value = '';
            document.getElementById('clear-signature-btn').style.display = 'none';
            document.getElementById('approve-btn').disabled = true;
            hideSignatureError();
        }
        
        // Approve request
        async function approveRequest() {
            if (hasApproved) {
                showMessage('error', '⚠️ Đề nghị này đã được xử lý. Không thể phê duyệt lại.');
                return;
            }
            
            if (!signatureData) {
                showSignatureError('❌ Vui lòng tải lên chữ ký trước khi phê duyệt');
                return;
            }
            
            if (!confirm('Bạn có chắc chắn muốn phê duyệt đề nghị này?')) {
                return;
            }
            
            const loading = document.getElementById('loading');
            const approveBtn = document.getElementById('approve-btn');
            
            loading.classList.add('show');
            approveBtn.disabled = true;
            
            try {
                const comment = document.getElementById('comment-input').value.trim();

                // ============ SIGNATURE VERIFICATION ============
                let verificationResult = { verified: false, reason: 'no_sample_required', similarity: '0' };
                if (companyApproversData && currentApproverRole) {
                    let sampleSignatureUrl = null;
                    if (currentApproverRole === 'accountant' && companyApproversData.accountant)
                        sampleSignatureUrl = companyApproversData.accountant.signature;
                    else if (currentApproverRole === 'legalRep' && companyApproversData.legalRep)
                        sampleSignatureUrl = companyApproversData.legalRep.signature;
                    else if (currentApproverRole === 'treasurer' && companyApproversData.treasurer)
                        sampleSignatureUrl = companyApproversData.treasurer.signature;

                    if (!sampleSignatureUrl || sampleSignatureUrl.trim() === '') {
                        showMessage('error', '❌ KHÔNG THỂ PHÊ DUYỆT: Thiếu chữ ký mẫu. Vui lòng liên hệ quản trị viên để cập nhật chữ ký mẫu.');
                        approveBtn.disabled = false;
                        return;
                    }

                    console.log('🔍 Verifying signature...');
                    verificationResult = await compareSignatures(signatureData, sampleSignatureUrl);
                    console.log('🔍 Verification result:', verificationResult);

                    if (!verificationResult.verified) {
                        let errorMsg = '';
                        if (verificationResult.reason === 'mismatch') {
                            errorMsg = `❌ KHÔNG THỂ PHÊ DUYỆT: Chữ ký không khớp!\n` +
                                `Độ tương đồng: ${verificationResult.similarity}% (yêu cầu tối thiểu: ${verificationResult.threshold}%)\n\n` +
                                `Gợi ý:\n- Đảm bảo chụp rõ, đủ sáng\n- Dùng đúng chữ ký đã đăng ký\n- Liên hệ quản trị viên nếu chữ ký đã thay đổi`;
                        } else if (verificationResult.reason === 'fetch_failed') {
                            errorMsg = `❌ KHÔNG THỂ PHÊ DUYỆT: Không thể tải chữ ký mẫu. Vui lòng thử lại hoặc liên hệ quản trị viên.`;
                        } else if (verificationResult.reason === 'hash_failed') {
                            errorMsg = `❌ KHÔNG THỂ PHÊ DUYỆT: Lỗi xử lý file chữ ký. Vui lòng kiểm tra file PNG/JPG và thử lại.`;
                        } else {
                            errorMsg = `❌ KHÔNG THỂ PHÊ DUYỆT: Lỗi xác thực chữ ký (${verificationResult.reason}). Vui lòng thử lại.`;
                        }
                        showMessage('error', errorMsg);
                        approveBtn.disabled = false;
                        return;
                    }
                    console.log('✅ Signature verification passed');
                }
                // ============ END SIGNATURE VERIFICATION ============

                const payload = {
                    action: 'approvePaymentRequest',
                    requestId: requestId,
                    stage: stage,
                    approver: approverEmail || 'Approver',
                    signature: signatureData,
                    signatureVerification: verificationResult,
                    comment: comment
                };
                
                console.log('🚀 Sending approval request...');
                
                const response = await fetch(VERCEL_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const responseText = await response.text();
                
                // Check for HTML error pages
                if (responseText.trim().startsWith('<!') || responseText.includes('<!DOCTYPE')) {
                    throw new Error('Backend returned HTML error page instead of JSON');
                }
                
                // Parse JSON
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    console.error('Response text:', responseText.substring(0, 500));
                    throw new Error('Invalid JSON response from backend');
                }
                
                if (!result.success) {
                    throw new Error(result.message || 'Unknown error');
                }
                
                console.log('✅ Approval successful');
                saveCachedSignature(signatureData);
                showMessage('success', '✅ Phê duyệt thành công! Trang sẽ tự động đóng sau 3 giây...');
                hasApproved = true;
                
                // Close window after 3 seconds
                setTimeout(() => {
                    window.close();
                }, 3000);
                
            } catch (error) {
                console.error('❌ Error approving request:', error);
                showMessage('error', '❌ Lỗi khi phê duyệt: ' + error.message);
                approveBtn.disabled = false;
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Show message
        function showMessage(type, text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type + ' show';
        }
        
        // Show signature error
        function showSignatureError(text) {
            const error = document.getElementById('signature-error');
            error.textContent = text;
            error.style.display = 'block';
        }
        
        // Hide signature error
        function hideSignatureError() {
            const error = document.getElementById('signature-error');
            error.textContent = '';
            error.style.display = 'none';
        }
    </script>
</body>
</html>
