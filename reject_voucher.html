<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trả lại / Từ chối Phiếu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-1: #0b1220;
            --bg-2: #111827;
            --surface: rgba(15, 23, 42, 0.9);
            --surface-soft: rgba(30, 41, 59, 0.92);
            --line: rgba(148, 163, 184, 0.25);
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --danger: #f43f5e;
            --danger-soft: rgba(244, 63, 94, 0.2);
        }
        body {
            font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", sans-serif;
            background:
                radial-gradient(circle at 15% 15%, rgba(244, 63, 94, 0.2), transparent 35%),
                radial-gradient(circle at 86% 80%, rgba(14, 165, 233, 0.18), transparent 30%),
                linear-gradient(150deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-main);
        }
        .container {
            width: 100%;
            max-width: 760px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 26px 65px rgba(2, 6, 23, 0.58);
        }
        .panel-head {
            padding: 1.2rem 1.4rem;
            border-bottom: 1px solid var(--line);
            background: rgba(15, 23, 42, 0.78);
        }
        h1 { color: #fecdd3; font-size: 1.4rem; margin-bottom: 0.35rem; }
        .subtitle { color: var(--text-soft); font-size: 0.84rem; }
        .panel-body { padding: 1.2rem 1.4rem 1.35rem; display: grid; gap: 0.95rem; }
        .voucher-info {
            background: var(--surface-soft);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0.95rem;
        }
        .voucher-info p { margin: 0.38rem 0; color: #dbeafe; font-size: 0.88rem; }
        .voucher-info strong { color: #fda4af; display: inline-block; min-width: 124px; }
        .form-group { margin-bottom: 0.4rem; }
        label { display: block; margin-bottom: 8px; color: #f1f5f9; font-weight: 600; font-size: 0.9rem; }
        textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.55);
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
        }
        textarea::placeholder { color: #94a3b8; }
        textarea:focus-visible { outline: 2px solid rgba(244, 63, 94, 0.52); outline-offset: 2px; border-color: var(--danger); }

        .reason-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin: 0.25rem 0 0.6rem;
        }
        .reason-chip {
            border: 1px solid rgba(244, 63, 94, 0.35);
            background: rgba(244, 63, 94, 0.1);
            color: #fecdd3;
            border-radius: 999px;
            font-size: 0.75rem;
            padding: 0.32rem 0.62rem;
            cursor: pointer;
        }
        .reason-note {
            font-size: 0.76rem;
            color: #94a3b8;
            margin-top: 0.4rem;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 0.7rem;
            margin-top: 0.3rem;
        }
        button {
            border: none;
            border-radius: 10px;
            padding: 0.78rem 1rem;
            font-size: 0.93rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
        }
        .btn-reject {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: #fff1f2;
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3);
        }
        .btn-reject:hover { transform: translateY(-1px); }
        .btn-cancel { background: rgba(100, 116, 139, 0.2); color: #dbeafe; border: 1px solid var(--line); }

        .message {
            padding: 0.75rem 0.85rem;
            border-radius: 9px;
            margin-bottom: 0.15rem;
            display: none;
            font-size: 0.84rem;
        }
        .message.success { background: rgba(34, 197, 94, 0.18); color: #dcfce7; border: 1px solid rgba(34, 197, 94, 0.3); }
        .message.error { background: var(--danger-soft); color: #fecdd3; border: 1px solid rgba(244, 63, 94, 0.38); }
        .message.show { display: block; }

        .loading { display: none; text-align: center; padding: 0.5rem 0 0.3rem; color: #fecdd3; font-size: 0.84rem; }
        .loading.show { display: block; }
        .spinner {
            border: 3px solid rgba(148, 163, 184, 0.35);
            border-top: 3px solid var(--danger);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            animation: spin 0.95s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .required { color: var(--danger); }
        @media (max-width: 700px) {
            .button-group { grid-template-columns: 1fr; }
            .voucher-info strong { min-width: 110px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel-head">
            <h1>TRẢ LẠI / TỪ CHỐI PHIẾU</h1>
            <p class="subtitle">Chọn lý do rõ ràng để người nộp chỉnh sửa nhanh và gửi lại đúng.</p>
        </div>
        <div class="panel-body">
            <div id="message" class="message"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Đang xử lý...</p>
            </div>

            <div id="voucher-info" class="voucher-info">
                <!-- Voucher info will be populated from URL params -->
            </div>

            <form id="reject-form">
                <div class="form-group">
                    <label for="reject-reason">Lý do trả lại <span class="required">*</span></label>
                    <div class="reason-chips" id="quick-reason-chips">
                        <button type="button" class="reason-chip" data-reason="Thiếu chứng từ đính kèm cần thiết.">Thiếu chứng từ</button>
                        <button type="button" class="reason-chip" data-reason="Thông tin số tiền/chỉ tiêu chi chưa chính xác.">Sai số tiền</button>
                        <button type="button" class="reason-chip" data-reason="Nội dung chi chưa rõ mục đích, cần bổ sung mô tả cụ thể.">Mô tả chưa rõ</button>
                        <button type="button" class="reason-chip" data-reason="Cần cập nhật lại thông tin công ty/người nhận để khớp hồ sơ.">Sai thông tin hồ sơ</button>
                    </div>
                    <textarea
                        id="reject-reason"
                        name="reject-reason"
                        placeholder="Mô tả ngắn gọn nhưng đủ hành động: thiếu gì, cần chỉnh gì, và cách gửi lại."
                        required
                    ></textarea>
                    <div class="reason-note">Mẹo: lý do từ 12 ký tự trở lên sẽ giúp người nộp xử lý nhanh hơn.</div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-cancel" onclick="window.close()">Hủy</button>
                    <button type="submit" class="btn-reject">Xác nhận trả lại</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const voucherNumber = urlParams.get('voucherNumber') || 'N/A';
        const voucherType = urlParams.get('voucherType') || 'N/A';
        const company = urlParams.get('company') || 'N/A';
        const employee = urlParams.get('employee') || 'N/A';
        const amount = urlParams.get('amount') || 'N/A';
        const requestorEmail = urlParams.get('requestorEmail') || '';
        const approverEmail = urlParams.get('approverEmail') || '';

        // Debug: Log all URL parameters
        console.log('=== REJECT VOUCHER PAGE LOADED ===');
        console.log('Full URL:', window.location.href);
        console.log('URL Parameters:', {
            voucherNumber: voucherNumber,
            voucherType: voucherType,
            company: company,
            employee: employee,
            amount: amount,
            requestorEmail: requestorEmail,
            approverEmail: approverEmail
        });
        console.log('Requestor Email:', requestorEmail);
        console.log('Approver Email:', approverEmail);
        
        if (!requestorEmail || requestorEmail.trim() === '') {
            console.error('❌ ERROR: requestorEmail is empty!');
            console.error('This will cause email rejection notification to fail.');
            console.error('Please check the rejection link in the email.');
        } else {
            console.log('✅ requestorEmail is valid:', requestorEmail);
        }

        // Populate voucher info
        document.getElementById('voucher-info').innerHTML = `
            <p><strong>Số phiếu:</strong> ${voucherNumber}</p>
            <p><strong>Loại phiếu:</strong> ${voucherType}</p>
            <p><strong>Công ty:</strong> ${company}</p>
            <p><strong>Người đề nghị:</strong> ${employee}</p>
            <p><strong>Tổng số tiền:</strong> ${amount}</p>
            ${requestorEmail ? `<p><strong>Email người đề nghị:</strong> ${requestorEmail}</p>` : '<p style="color: red;"><strong>⚠️ Cảnh báo:</strong> Không tìm thấy email người đề nghị!</p>'}
        `;

        // Use proxy URL to avoid CORS issues
        // For direct URL, use: 'https://script.google.com/macros/s/AKfycby8ed1o2d7Cf6dU0zZwnDnHYpuoQEo4wVQ99UmgMY0btzTolsC_90QBvb056UZyXMG7/exec'
        const GOOGLE_APPS_SCRIPT_WEB_APP_URL = '/api/voucher';
        const rejectReasonInput = document.getElementById('reject-reason');
        document.querySelectorAll('.reason-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                const text = this.dataset.reason || '';
                if (!rejectReasonInput.value.trim()) {
                    rejectReasonInput.value = text;
                } else if (!rejectReasonInput.value.includes(text)) {
                    rejectReasonInput.value = `${rejectReasonInput.value.trim()} ${text}`.trim();
                }
                rejectReasonInput.focus();
            });
        });

        document.getElementById('reject-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const reason = rejectReasonInput.value.trim();
            
            if (!reason) {
                showMessage('Vui lòng nhập lý do trả lại', 'error');
                return;
            }
            if (reason.length < 12) {
                showMessage('Lý do quá ngắn. Vui lòng mô tả rõ để người nộp xử lý nhanh.', 'error');
                rejectReasonInput.focus();
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('reject-form').style.display = 'none';

            try {
                // Use POST method for consistency and better error handling
                const requestData = {
                    action: 'rejectVoucher',
                    voucher: {
                        voucherNumber: voucherNumber,
                        voucherType: voucherType,
                        company: company,
                        employee: employee,
                        amount: amount,
                        requestorEmail: requestorEmail,
                        approverEmail: approverEmail,
                        rejectReason: reason,
                        rejectedBy: approverEmail
                    }
                };

                // Use FormData to avoid CORS preflight issues
                const formData = new FormData();
                formData.append('data', JSON.stringify(requestData));

                const url = GOOGLE_APPS_SCRIPT_WEB_APP_URL;
                
                console.log('=== SENDING REJECTION REQUEST ===');
                console.log('URL:', url);
                console.log('Requestor Email:', requestorEmail);
                console.log('Approver Email:', approverEmail);
                console.log('Reject Reason:', reason);
                
                // Validate again before sending
                if (!requestorEmail || requestorEmail.trim() === '') {
                    console.error('❌ CRITICAL ERROR: requestorEmail is empty! Cannot send rejection email.');
                    showMessage('Lỗi: Không tìm thấy email người đề nghị. Không thể gửi email thông báo.', 'error');
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('reject-form').style.display = 'block';
                    return;
                }

                const response = await fetch(url, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'follow',
                    body: formData
                });

                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                // Check if response is ok before parsing
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ HTTP Error:', response.status, response.statusText);
                    console.error('❌ Error response body:', errorText.substring(0, 500));
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                // Read response text first to check format
                const responseText = await response.text();
                console.log('Response text (first 200 chars):', responseText.substring(0, 200));
                
                // Check if response is HTML (error page)
                if (responseText.trim().toLowerCase().startsWith('<!doctype') || responseText.trim().toLowerCase().startsWith('<html')) {
                    console.error('❌ Response is HTML (error page), not JSON');
                    console.error('Full HTML response:', responseText.substring(0, 1000));
                    throw new Error('Backend trả về trang lỗi HTML thay vì JSON. Có thể URL backend không đúng hoặc có lỗi server.');
                }
                
                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('Response data:', result);
                } catch (parseError) {
                    console.error('❌ Failed to parse response as JSON:', parseError);
                    console.error('❌ Response was:', responseText.substring(0, 500));
                    throw new Error(`Invalid JSON response: ${parseError.message}`);
                }
                
                if (result.success) {
                    showMessage('Đã trả lại phiếu thành công! Email thông báo đã được gửi đến người đề nghị.', 'success');
                    
                    // Close window after 3 seconds
                    setTimeout(() => {
                        window.close();
                    }, 3000);
                } else {
                    // Show error message from backend
                    const errorMsg = result.message || 'Có lỗi xảy ra khi từ chối';
                    
                    // Check for already processed error
                    if (errorMsg.includes('already processed') || errorMsg.includes('đã được xử lý') || errorMsg.includes('đã duyệt') || errorMsg.includes('đã từ chối') || errorMsg.includes('không thể từ chối')) {
                        showMessage('⚠️ Phiếu này đã được xử lý trước đó. Không thể từ chối lại.', 'error');
                    } else {
                        showMessage('Lỗi: ' + errorMsg, 'error');
                    }
                    
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('reject-form').style.display = 'block';
                }

            } catch (error) {
                console.error('Error rejecting voucher:', error);
                showMessage('Có lỗi xảy ra. Vui lòng thử lại hoặc liên hệ IT support.', 'error');
                document.getElementById('loading').classList.remove('show');
                document.getElementById('reject-form').style.display = 'block';
            }
        });

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type} show`;
            
            // Hide loading
            document.getElementById('loading').classList.remove('show');
        }
    </script>
</body>
</html>
